<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>CSS 적용방법연습</title>

        <!-- 스타일을 적용하는 세가지 방법 -->
        <!-- 1.외부 스타일시트 (별도의 CSS문서를 작성하고 연결) -->
         <link rel="stylesheet" href="./02_text.css">
        <!-- 2.내부 스타일시트  -->
         <style>
            /* 이영역안에서는 CSS 언어의 문법체계를 따름 */
            p{font-style: italic; color: red !important;}
         </style>

    </head>

    <body>
        <!-- 3.인라인 스타일  -->

        <p style="font-weight: bold; color: green;">hello world</p>


    </body>
</html>
