<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>링크</title>
        <!-- 내부스타일시트 -->
        <style>
            /* 원하는 의사선택자만 써도되지만 의사선택자는 이 순서대로해야함 */
            #aa:link{color: blue;}
            #aa:visited{color: green;}
            #aa:hover{color: red; font-size: 2.0em;}
            #aa:active{color: yellow;}


            p:hover{background-color: green;}
            img{width: 100px; border : 3px solid black;}
            img:hover{width: 150px; border: 5px solid lawngreen;}

            /* 리스트의 스타일 */

            ul{list-style: circle;}
            ul{list-style: disc;}/* 이게 기본값 */
            ul{list-style: square;}
            

            /* 이미지로 불릿기로를 대체하는 방식은 잘 사용하지 않는다. 사이즈문제나 꾸미기가 어렵다. */
            /* ul{list-style-image: url(../Day01/image/camera.jpg);} */
            ul{list-style-type: disc; list-style-position: inside;}
            ul{list-style: none;}

            ol{list-style-type: lower-roman;}
            ol{list-style-type: lower-greek;}
            ol{list-style-type: decimal;} /* 기본값 */
            ol{list-style-type: decimal-leading-zero;}


        </style>
    </head>

    <body>
        
        <a href="https://www.daum.net" id="aa">다음</a>

        <p>Hello</p>
        <img src="../Day01/image/newyork.jpg" alt="뉴욕 이미지">

        <hr>

        <ul>
            <li>aaa</li>
            <li>bbb</li>
            <li>ccc</li>

        </ul>

        <ol>
            <li>aaa</li>
            <li>bbb</li>
            <li>ccc</li>

        </ol>
    </body>
</html>
