<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>표의 구조 지정하기</title>
                <style>
            table, th, td{
                border:1px solid #ccc;
                border-collapse: collapse;
            }
            th, td {padding: 10px 20px;}
        </style>
    </head>

    <body>
        <h2>상품구성 </h2>
        <table>
            <caption>선물용과 가정용 상품 구성</caption>
            <thead>
                <tr>
                    <td>용도</td>
                    <td>중량</td>
                    <td>개수</td>
                    <td>가격</td>
                </tr>
            </thead>
            <tbody>
                <tr >
                    <td rowspan="2">선물용</td>
                    <td>3kg</td>
                    <td>11~16과</td>
                    <td>35,000원</td>
                </tr>
                <tr>
                    <td>5kg</td>
                    <td>18~26과</td>
                    <td>52,000원</td>
                </tr>
                <tr>
                    <td rowspan="2"> 가정용 </td>
                    <td>3kg</td>
                    <td>11~16과</td>
                    <td>30,000원</td>
                </tr>
                <tr>
                    <td>5kg</td>
                    <td>18~26과</td>
                    <td>47,000원</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
