<!DOCTYPE html>
<html>
    <head>
        <meta charset="UtF-8">
        <title>Table_ex</title>
    </head>
    <body>
        <h2>Table 요소 연습</h2>

        <table border="1s">
            <tr>
                <th>번호</th>
                <th>이름</th>
                <th>메세지</th>
            </tr>
            <tr>
                <td>1</td>
                <td>sam</td>
                <td>hello table</td>
            </tr>
            <tr>
                <td>2</td>
                <td>robin</td>
                <td>nice to meet you</td>
                <!-- 각행(row)의 셀(칸) 갯수가 달라고 됨  -->
                 <td>2026-05-26</td>
            </tr>
                        <!-- 표 제목 표기하기(작성위치와 상관 없이 무조건 표의 상단에위치됨) css 를 통해 위치 조정이 가능하다-->
            <caption>table 제목 표시</caption>
        </table>
        
        <hr>
        <!-- 테이블 한 칸(셀) 안에 다른 요소를 넣어보기 -->
        <table border="1" width="100%">
            <tr>
                <td width="30%"><a href="https://naver.com">네이버로 이동</a></td>
                <td>
                    <ul>
                        <li>aaa</li>
                        <li>bbb</li>
                        <li>ccc</li>
                    </ul>
                </td>
            </tr>
            <tr>
                <td>
                    <p>테이블안에 어떤 요소든 넣을 수 있음. 한글이면 자동으로 줄바꿈됨</p>
                    <!-- 영어는 띄어쓰기 기준을 줄바꿈이 이뤄진다 -->
                    <p>asnfjfewa sdbfsvicxvjdkajbrkasjdrbuasvadriosjddnlfknalvjnsadulrisjldsdksdjfsalk</p>
                </td>
                <td>
                    <img src="./image/newyork.jpg" alt="newyork" width="70%">
                </td>
            </tr>
        </table>

        <hr>

        <table border="1">
            <tr>
                <!-- 다음 줄이 없으면 span은 발동하지 않는다. -->
                <td rowspan="2">111</td>
                <td colspan="3">222</td>
                <td>333</td>

            </tr>
            <tr>
                <td>444</td>
                <td>555</td>
                <td>666666666666666</td>
            </tr>


        </table>

    </body>

</html>
