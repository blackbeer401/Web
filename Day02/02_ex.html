<!DOCTYPE html>
<html>
    <meta charset="utf-8">
    <head>
        <title>element 연습</title>
    </head>
    <body>
        <!-- 1.오디오 요소 -->
        <audio src="./audio/old_pop.mp3" controls="controls">오디오 태그가 지원되지 않으면 보이는 글씨</audio>
        
        <!-- 브라우저마다 지원 가능한 음원의 유형이 다르기에.. 그에 대응하기..  -->
        <audio controls>
            <!-- type 는 mime 타입을 지정  -->
            <source src="./audio/old_pop.mp3" type="audio/mp3">
            <source src="./audio/old_pop.wav" type="audio/wav">
            <source src="./audio/old_pop.ogg" type="audio/ogg">
        </audio>
        <!-- 미디어파일 무료변환 사이트 online converter.com -->
        
        <hr>

        <!-- 2.비디오 요소 -->
        <video controls>
            <source src="./video/movie.ogv" type="video/ogg">
            <source>
        </video>

        <!-- autoplay 와 mute를 함께 써야 자동 재생이 가능하다. -->
        <video controls width="480" height="320" poster="./image/paris.jpg" autoplay muted>
            <source src="./video/trailer.mp4" type="video/mp4">
            <source src="./video/trailer.ogv" type="video/ogv">
            <source src="./video/trailer.webm" type="video/webm">
        </video>

        <!-- 예전에 미디어파일 전용 요소가 없을때 사용하던요소  [embed] 와 [object] -->
        <embed src="./SQL.pdf" type="application/pdf"> <!-- 가장 오래된것 -->
        <hr>
        <object data="./SQL.pdf" type="application/pdf" width="50%" height="300"></object> 
        <hr>
        <!-- 현재는 embed, object 모두 사용하지 않고 iframe으로 사용하는걸 권장한다. -->

        <!-- 3. iframe : 다른 html 문서를 내문서 안에서 보여주는 것 [inline frame] 이걸 주의 깊게 봐야한다 인라인이다. -->
        <!-- 1 상대경로-->
        <iframe src="./01_table.html" ></iframe>
        <!-- 2 절대경로-->
        <iframe src="http://mbca2025aix.dothome.co.kr" frameborder="0"></iframe>
        <iframe src="https://sr.mbccomputer.co.kr/front/home?gad_source=1&gad_campaignid=21300389686&gbraid=0AAAAA9rzfTcncFaD6M-fnk7SMSPGqYfES&gclid=CjwKCAjw5s_QBhAdEiwADD_gBpd6bd5OTTLXtyOMyZ3CE8BqnSl4LLn_gN9A_6y8i24K-4ws2SJvZBoCkZEQAvD_BwE" frameborder="0"></iframe>
        <hr>

        <!-- 3 하이퍼링크요소 <a> 요소 에 의하여 열리는 페이지를 iframe 안에 때려박을수 있다. name 속성 지정 -->
            <iframe src="" frameborder="2" name="aaa" width="560"></iframe>
            <a href="https://www.daum.net" target="aaa">다음 포털 사이트</a>
            <!-- iframe 가 동작하지 못하는 사이트도 존재함. 보통 동적으로 화면을 구성하는 사이트들( 요즘 많은 사이트가 이렇게 만들고 있음) -->
             <a href="https://www.naver.com" target="aaa">네이버 포털 사이트 </a>

        <hr>
        <!-- pdf 파일 뷰어도 iframe을 권장함 -->
         <iframe src="./SQL.pdf" frameborder="0" width="50%" height="300"></iframe>

         <hr>

         <!-- 4. 화면의 일부 영역을 구분하는 용도의 요소 2개 div , span -->

         <div style="background-color: yellow; border: 2px solid red; padding: left 10px;">
            <h2>TITLE</h2>
            <P>this is message</P>
         </div>

         <!-- div 의 블럭요소 특징 -->
        <p>
            안녕하세요 나는 <div style="color: blue;">홍길동</div>입니다.
        </p>

        <!-- span요소 인라인 요소 특징 -->
        <p>
            안녕하세요 나는 <span style="color: blue;">홍길동</span>입니다.
        </p>

        <hr>

        <!--div요소는 실제 현업의 프론트엔드  -->
        <!-- 웹 페이지를 만들때 보통 먼저 페이지의 구조를 구성하는것 부터 시작함 -->
        <!-- 이때 div 를 사용한다.  -->

        <div id="header" style="background-color: yellow;">앱 상단 로고영역</div>
        <div id="main" style="background-color: green; height: 400px;"> 메인영역</div>
        <div id footer style="background-color: blue;"> 앱 하단 바 영역 </div>

    </body>
</html>
