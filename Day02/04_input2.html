<!DOCTYPE html>
<html>
    <head>
        <meta charset="uts-8">
        <title>input element2</title>
    </head>
    <body>
        <!-- 여러줄 입력 -->
        <textarea cols="40" rows="5"></textarea>
        <hr>

        <!-- 콤보박스 용 요소 -->
        <select >
            <option value="aa">사과</option>
            <option value="bb">바나나</option>
            <option value="cc">오렌지</option>
        </select>

        <!-- 옵션그룹 활용 -->
         <select>
            <optgroup label="중식">
                <option value="a">짜장면</option>
                <option value="b">짬뽄</option>
                <option value="c">볶음밥</option>
            </optgroup>

            <optgroup label="일식">
                <option value="">초밥</option>
                <option value="">회</option>
                <option value="">덮밥</option>
            </optgroup>
         </select>

         <hr>

         <fieldset>
            <legend>필드셋의 제목 (개인정보)</legend>
            <label >이름: <input type="text" name="name"></label>
            <label> 나이: <input type="text" name="age"></label>
         </fieldset>

         <hr>

         <!-- 파일 선택하기 -->
        <input type="file" accept="image/png">
        <hr>
        <!-- 여러개의파일 선택 -->
        <input type="file" accept="image/*" multiple>
        <hr>

        <!-- 비교적 최근에 새로 추가된 type들 -->
        <form action="">
            <!-- 날짜 선택 관련 타입들 -->
            <input type="date"> <br>
            <input type="datetime"> <!-- 이거 지원 안됨( 나라마다 시간이 다르기에)--><br>
            <input type="datetime-local"><!-- 이건 지원이 됨 --> <br>
            <input type="month"><br>
            <input type="week"> <br>

            <hr>

            <!-- 색상을 선택하는 창 -->

        <input type="color"> <br>

        <!-- 이메일 입력 박스 [데스트 탑에서는 의미 없어보이나 모바일에서 키패드의 모양이 달라보이게 된다.]-->
        <input type="email"> <br>

        <!-- 전화번호 [모바일에서 키패드의 모양이 달라짐.]-->
        <input type="tel"> <br>

        <!-- 검색어 입력박스[글씨를 쓰면 삭제 버튼이 우측 끝에 표기됨] -->
        <input type="search"> <br>

        <!-- 범위지정 요소 -->
        <input type="range" min="0" max="10" step="2" value="4"><br>

        <!-- 숫자 지정 선택 요소  -->
        <input type="number" min="210" max="300" step="10" value="230"> <br>

        <!-- url 입력 [모바일에서 키보드 모양이 다름]-->
         <input type="url"> <br>


        </form>


        <hr>

        <!-- 비교적 최근에 새롭게 추가된 input의 속성들 -->
        <form action="aaa.php">
            <!-- 힌트 글씨 표기 가능  -->
            <input type="text" placeholder="이름을 입력하세요"> <br>

            <!-- 반드시 입력해야 하는 요소에 적용하는 속성(form요소 안에서만 의미를가진다.) -->
            <input type="text" required><br>

            <hr>
            <input type="submit">

            <hr>
            <!-- 글씨는 보이지만 수정 불가 -->
            <input type="text" readonly value="sam"> <br>

            <!-- 페이지가 로딩 될 때 가장 먼서 포커스를 받고 싶다면? 참고로 위에도 오토 포커스가 있다면? 위에서부터  -->
            <input type="text" autofocus><br>

            <!-- 최대 입력 글자수 제한 -->
            <input type="text" maxlength="5"> <br>

            <!-- 자동완성기능 -->
            <input type="text" autocomplete list="datas"> <br>
            <datalist id="datas">
                <option value="canada" label="캐나다"></option>
                <option value="china" label="중국"></option>
                <option value="korea" label="한국"></option>
                <option value="choco" label="초코"></option>
            </datalist>
        </form>


    </body>
</html>
