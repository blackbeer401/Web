<!DOCTYPE html>
<html>
    <head> 
        <meta charset="utf-8">
        <title>http request</title>
    </head>
    <body>
        <h2>http request test</h2>

        <!-- form요소 :anchor요소처럼 다른문서를 실행하지만 데이터를 전달 할 수 있고 이동하기 위한 별도의 input 요소가 필요함(백엔드 프로그램(php)을 실행하고 데이터를 전달 하는 요소 ) -->
        <!-- 1. get 방식 : 보낼 데이터를 URL 뒤에 ? 후 붙여서 전달 하는 방식 -->
        <form action="./aaa.php" method="get">
            <input type="text" placeholder="제목 입력" name="title">
            <input type="text" placeholder="메세지 입력" name="msg">

            <input type="submit">

        </form>
        <hr>

        <!--2. post 방식: 데이터를 숨겨서 보내는 방식 응답이 느려지지만 보안성이 좋다.  -->
        <fieldset>
            <legend>POST method test</legend>
            <form action="./bbb.php" method="post">
                <label for="in1">아이디: </label>
                <input type="text" name="user_id" id="in1"><br>

                <label>비밀번호: <input type="password" name="user_pw"></label>

                <p>
                    성별: 
                    <label> <input type="radio" name="gender" value="male" checked> 남성 </label>
                    <label> <input type="radio" name="gender" value="female"> 여성 </label>
                </p>

                <p>
                    당신이 좋아하는 과일을 모두 선택하세요 <br>
                    <label> <input type="checkbox" name="fruits[]" value="apple">사과</label> &nbsp;&nbsp;
                    <label> <input type="checkbox" name="fruits[]" value="banana">바나나</label> &nbsp;&nbsp;
                    <label> <input type="checkbox" name="fruits[]" value="orange">오렌지</label> &nbsp;&nbsp;
                </p>

                <p>
                    메세지: <br>
                    <textarea name="msg" cols="40" rows="5"></textarea>
                </p>


                <div>
                    <select name="brand">
                        <optgroup label="자동차 브랜드">
                            <option value="현대">현대</option>
                            <option value="기아">기아</option>
                            <option value="KGM">KGM</option>
                        </optgroup>
                    </select>
                </div>

                <hr>
                <input type="submit" value="서버전송">
                <input type="reset" value="작성취소">
                

            </form>


        </fieldset>
    </body>
</html>
